# YAHATL Automations
# Include in configuration.yaml under automation:
#
# automation: !include custom_components/yahatl/dashboards/automations.yaml
#
# Or add to existing automation includes:
# automation: !include_dir_merge_list automations/
# (then copy this file to your automations/ directory)

# Quick Capture from input helper
- id: yahatl_quick_capture_automation
  alias: "YAHATL: Quick Capture"
  description: "Capture text to inbox when input is set"
  trigger:
    - platform: state
      entity_id: input_text.yahatl_capture_text
  condition:
    - condition: template
      value_template: "{{ trigger.to_state.state | length > 0 }}"
  action:
    - service: rest_command.yahatl_capture
      data:
        title: "{{ trigger.to_state.state }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.yahatl_capture_text
      data:
        value: ""
    - service: persistent_notification.create
      data:
        title: "YAHATL"
        message: "Captured: {{ trigger.to_state.state }}"
