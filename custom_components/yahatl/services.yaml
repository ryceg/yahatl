capture:
  name: Quick Capture
  description: Capture a quick thought to the inbox
  fields:
    title:
      name: Title
      description: The title of the item to capture
      required: true
      selector:
        text:
    tags:
      name: Tags
      description: Optional list of tags
      required: false
      selector:
        text:
          multiple: true

complete_task:
  name: Complete Task
  description: Mark a task as complete
  fields:
    note_id:
      name: Note ID
      description: The ID of the note/task to complete
      required: true
      selector:
        text:

complete_chore:
  name: Complete Chore
  description: Mark a chore as complete and reschedule
  fields:
    note_id:
      name: Note ID
      description: The ID of the chore note
      required: true
      selector:
        text:

log_habit:
  name: Log Habit
  description: Log a habit completion for today
  fields:
    note_id:
      name: Note ID
      description: The ID of the habit note
      required: true
      selector:
        text:

start_pomodoro:
  name: Start Pomodoro
  description: Start a Pomodoro timer session
  fields:
    note_id:
      name: Note ID
      description: Optional note to focus on
      required: false
      selector:
        text:
    duration_minutes:
      name: Duration
      description: Session duration in minutes
      required: false
      default: 25
      selector:
        number:
          min: 1
          max: 120
          step: 5
          unit_of_measurement: minutes

stop_pomodoro:
  name: Stop Pomodoro
  description: Stop the current Pomodoro session
