# YAHATL Input Helpers Configuration
# Add this to your Home Assistant configuration.yaml
#
# These input helpers enable editing of YAHATL item metadata via the dashboard

input_text:
  yahatl_capture_text:
    name: Quick Capture
    icon: mdi:text-box-plus
    max: 500
    mode: text

  yahatl_selected_note_id:
    name: Selected Note ID
    icon: mdi:identifier
    max: 50
    mode: text

input_number:
  yahatl_chore_interval:
    name: Chore Repeat Interval
    icon: mdi:calendar-repeat
    min: 1
    max: 365
    step: 1
    unit_of_measurement: days
    mode: box

  yahatl_pomodoro_duration:
    name: Pomodoro Duration
    icon: mdi:timer
    min: 5
    max: 120
    step: 5
    unit_of_measurement: minutes
    mode: slider

input_select:
  yahatl_task_priority:
    name: Task Priority
    icon: mdi:flag
    options:
      - Low
      - Normal
      - High
      - Urgent
    initial: Normal

  yahatl_habit_frequency:
    name: Habit Frequency
    icon: mdi:calendar-clock
    options:
      - daily
      - every 2 days
      - 3x per week
      - weekly
      - biweekly
      - monthly
    initial: daily

  yahatl_task_status:
    name: Task Status
    icon: mdi:checkbox-marked-circle-outline
    options:
      - Pending
      - InProgress
      - Complete
      - Cancelled
    initial: Pending

input_datetime:
  yahatl_task_due_date:
    name: Task Due Date
    icon: mdi:calendar
    has_date: true
    has_time: false
