title: YAHATL
views:
  - title: Dashboard
    path: dashboard
    icon: mdi:checkbox-marked-outline
    type: sections
    max_columns: 3
    sections:
      # ======================
      # HEADER SECTION
      # ======================
      - type: grid
        column_span: 3
        cards:
          - type: custom:mushroom-title-card
            title: "YAHATL"
            subtitle: "{{ now().strftime('%A, %B %d') }}"

          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:alert-circle
                icon_color: |-
                  {% if states('sensor.yahatl_overdue_count') | int > 0 %}
                    red
                  {% else %}
                    green
                  {% endif %}
                content: "{{ states('sensor.yahatl_overdue_count') }} overdue"
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/tasks

              - type: template
                icon: mdi:calendar-today
                icon_color: |-
                  {% if states('sensor.yahatl_due_today') | int > 0 %}
                    orange
                  {% else %}
                    grey
                  {% endif %}
                content: "{{ states('sensor.yahatl_due_today') }} due today"
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/tasks

              - type: template
                icon: mdi:inbox
                icon_color: |-
                  {% if states('sensor.yahatl_inbox_count') | int > 0 %}
                    blue
                  {% else %}
                    grey
                  {% endif %}
                content: "{{ states('sensor.yahatl_inbox_count') }} inbox"
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/inbox

              - type: template
                icon: mdi:fire
                icon_color: |-
                  {% if states('sensor.yahatl_streaks_at_risk') | int > 0 %}
                    deep-orange
                  {% else %}
                    green
                  {% endif %}
                content: "{{ states('sensor.yahatl_streaks_at_risk') }} at risk"
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/habits

              - type: template
                icon: mdi:timer
                icon_color: |-
                  {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                    red
                  {% else %}
                    grey
                  {% endif %}
                content: |-
                  {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                    Focus
                  {% else %}
                    Ready
                  {% endif %}
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/pomodoro

      # ======================
      # SUMMARY CARDS SECTION
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Summary
            subtitle: Your productivity at a glance

          # Overdue Count Card
          - type: custom:mushroom-template-card
            primary: Overdue Tasks
            secondary: "{{ states('sensor.yahatl_overdue_count') }} tasks past due"
            icon: mdi:alert-circle
            icon_color: |-
              {% if states('sensor.yahatl_overdue_count') | int > 0 %}
                red
              {% else %}
                green
              {% endif %}
            badge_icon: |-
              {% if states('sensor.yahatl_overdue_count') | int > 0 %}
                mdi:exclamation-thick
              {% endif %}
            badge_color: red
            tap_action:
              action: navigate
              navigation_path: /yahatl/tasks
            fill_container: true

          # Due Today Card
          - type: custom:mushroom-template-card
            primary: Due Today
            secondary: "{{ states('sensor.yahatl_due_today') }} tasks for today"
            icon: mdi:calendar-today
            icon_color: |-
              {% if states('sensor.yahatl_due_today') | int > 0 %}
                orange
              {% else %}
                grey
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /yahatl/tasks
            fill_container: true

          # Inbox Count Card
          - type: custom:mushroom-template-card
            primary: Inbox
            secondary: "{{ states('sensor.yahatl_inbox_count') }} items to process"
            icon: mdi:inbox
            icon_color: |-
              {% if states('sensor.yahatl_inbox_count') | int > 0 %}
                blue
              {% else %}
                grey
              {% endif %}
            tap_action:
              action: navigate
              navigation_path: /yahatl/inbox
            fill_container: true

          # Streaks at Risk Card
          - type: custom:mushroom-template-card
            primary: Streaks at Risk
            secondary: "{{ states('sensor.yahatl_streaks_at_risk') }} habits need attention"
            icon: mdi:fire-alert
            icon_color: |-
              {% if states('sensor.yahatl_streaks_at_risk') | int > 0 %}
                deep-orange
              {% else %}
                green
              {% endif %}
            badge_icon: |-
              {% if states('sensor.yahatl_streaks_at_risk') | int > 0 %}
                mdi:alert
              {% endif %}
            badge_color: orange
            tap_action:
              action: navigate
              navigation_path: /yahatl/habits
            fill_container: true

          # Blocked Items Card
          - type: custom:mushroom-template-card
            primary: Blocked Items
            secondary: "{{ states('sensor.yahatl_blocked_count') }} items waiting"
            icon: mdi:block-helper
            icon_color: |-
              {% if states('sensor.yahatl_blocked_count') | int > 0 %}
                purple
              {% else %}
                grey
              {% endif %}
            tap_action:
              action: more-info
              entity: sensor.yahatl_blocked_count
            fill_container: true

      # ======================
      # TASKS SECTION (Detailed)
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Tasks
            subtitle: Tap any task for details

          # Use a native todo-list for tasks with enhanced features
          - type: todo-list
            entity: todo.yahatl_tasks
            title: ""

      # ======================
      # CHORES SECTION (Detailed)
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Chores
            subtitle: Recurring household tasks

          - type: todo-list
            entity: todo.yahatl_chores
            title: ""

      # ======================
      # HABITS SECTION (Detailed)
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Habits
            subtitle: "Keep your streaks alive"

          - type: todo-list
            entity: todo.yahatl_habits
            title: ""

      # ======================
      # INBOX SECTION
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Inbox
            subtitle: "Quick captures to process"

          - type: todo-list
            entity: todo.yahatl_inbox
            title: ""

      # ======================
      # POMODORO SECTION
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Pomodoro Timer
            subtitle: Focus session control

          - type: custom:mushroom-template-card
            primary: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                Focus Session Active
              {% else %}
                Ready to Focus
              {% endif %}
            secondary: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                Tap to stop the timer
              {% else %}
                Tap to start a 25-minute session
              {% endif %}
            icon: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                mdi:timer-sand
              {% else %}
                mdi:timer-outline
              {% endif %}
            icon_color: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                red
              {% else %}
                teal
              {% endif %}
            tap_action:
              action: call-service
              service: |-
                {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                  yahatl.stop_pomodoro
                {% else %}
                  yahatl.start_pomodoro
                {% endif %}
            fill_container: true
            multiline_secondary: true

          # Pomodoro Quick Start Options
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "15 min"
                icon: mdi:clock-fast
                icon_color: teal
                layout: vertical
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 15

              - type: custom:mushroom-template-card
                primary: "25 min"
                icon: mdi:clock-outline
                icon_color: teal
                layout: vertical
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 25

              - type: custom:mushroom-template-card
                primary: "45 min"
                icon: mdi:clock
                icon_color: teal
                layout: vertical
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 45

              - type: custom:mushroom-template-card
                primary: "60 min"
                icon: mdi:clock-plus
                icon_color: teal
                layout: vertical
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 60

      # ======================
      # CALENDAR SECTION
      # ======================
      - type: grid
        column_span: 2
        cards:
          - type: custom:mushroom-title-card
            title: Upcoming
            subtitle: Tasks and chores scheduled ahead

          - type: calendar
            entities:
              - entity: calendar.yahatl
            initial_view: listWeek

      # ======================
      # QUICK ACTIONS SECTION
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Quick Actions
            subtitle: Common actions at your fingertips

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "Capture"
                icon: mdi:plus-circle
                icon_color: blue
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/capture

              - type: custom:mushroom-template-card
                primary: "Focus"
                icon: mdi:timer
                icon_color: teal
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/pomodoro

              - type: custom:mushroom-template-card
                primary: "New Task"
                icon: mdi:clipboard-plus
                icon_color: green
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/new-task

              - type: custom:mushroom-template-card
                primary: "New Chore"
                icon: mdi:broom
                icon_color: amber
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/new-chore

  # ======================
  # TASKS VIEW
  # ======================
  - title: Tasks
    path: tasks
    icon: mdi:checkbox-marked-circle-outline
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Tasks"
            subtitle: "Manage your tasks and to-dos"

          - type: custom:mushroom-chips-card
            chips:
              - type: back
              - type: template
                icon: mdi:alert-circle
                icon_color: red
                content: "{{ states('sensor.yahatl_overdue_count') }} overdue"
              - type: template
                icon: mdi:calendar-today
                icon_color: orange
                content: "{{ states('sensor.yahatl_due_today') }} due today"

          - type: todo-list
            entity: todo.yahatl_tasks
            title: All Tasks

  # ======================
  # INBOX VIEW
  # ======================
  - title: Inbox
    path: inbox
    icon: mdi:inbox
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Inbox"
            subtitle: "Capture now, organize later"

          - type: custom:mushroom-chips-card
            chips:
              - type: back
              - type: template
                icon: mdi:inbox
                icon_color: blue
                content: "{{ states('sensor.yahatl_inbox_count') }} items"

          - type: todo-list
            entity: todo.yahatl_inbox
            title: Inbox Items

  # ======================
  # CHORES VIEW
  # ======================
  - title: Chores
    path: chores
    icon: mdi:broom
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Chores"
            subtitle: "Recurring household tasks"

          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: todo-list
            entity: todo.yahatl_chores
            title: All Chores

  # ======================
  # HABITS VIEW
  # ======================
  - title: Habits
    path: habits
    icon: mdi:fire
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Habits"
            subtitle: "Build streaks, build yourself"

          - type: custom:mushroom-chips-card
            chips:
              - type: back
              - type: template
                icon: mdi:fire-alert
                icon_color: |-
                  {% if states('sensor.yahatl_streaks_at_risk') | int > 0 %}
                    orange
                  {% else %}
                    green
                  {% endif %}
                content: "{{ states('sensor.yahatl_streaks_at_risk') }} at risk"

          - type: todo-list
            entity: todo.yahatl_habits
            title: All Habits

  # ======================
  # POMODORO VIEW
  # ======================
  - title: Pomodoro
    path: pomodoro
    icon: mdi:timer
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Pomodoro Timer"
            subtitle: "Focus and productivity"

          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: custom:mushroom-template-card
            primary: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                🔴 Focus Session Active
              {% else %}
                ⚪ Ready to Focus
              {% endif %}
            secondary: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                Session in progress. Tap to stop.
              {% else %}
                Choose a duration below to start focusing.
              {% endif %}
            icon: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                mdi:timer-sand
              {% else %}
                mdi:timer-outline
              {% endif %}
            icon_color: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                red
              {% else %}
                teal
              {% endif %}
            tap_action:
              action: call-service
              service: yahatl.stop_pomodoro
            fill_container: true
            multiline_secondary: true

          - type: custom:mushroom-title-card
            subtitle: "Quick Start"

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "15 min"
                secondary: "Quick burst"
                icon: mdi:clock-fast
                icon_color: teal
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 15

              - type: custom:mushroom-template-card
                primary: "25 min"
                secondary: "Standard"
                icon: mdi:clock-outline
                icon_color: teal
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 25

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "45 min"
                secondary: "Extended"
                icon: mdi:clock
                icon_color: teal
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 45

              - type: custom:mushroom-template-card
                primary: "60 min"
                secondary: "Deep work"
                icon: mdi:clock-plus
                icon_color: teal
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 60

          - type: custom:mushroom-template-card
            primary: "Stop Timer"
            secondary: "End the current focus session"
            icon: mdi:stop-circle
            icon_color: red
            tap_action:
              action: call-service
              service: yahatl.stop_pomodoro
            fill_container: true

  # ======================
  # CAPTURE VIEW
  # ======================
  - title: Capture
    path: capture
    icon: mdi:plus-circle
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Quick Capture"
            subtitle: "Add to inbox instantly"

          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: markdown
            content: |
              Use the **todo.yahatl_inbox** entity to quickly add items:

              1. Open Developer Tools → Services
              2. Call `todo.add_item`
              3. Entity: `todo.yahatl_inbox`
              4. Enter your item text

              Or use voice commands with your preferred assistant!

          - type: todo-list
            entity: todo.yahatl_inbox
            title: Add to Inbox

  # ======================
  # NEW TASK VIEW
  # ======================
  - title: New Task
    path: new-task
    icon: mdi:clipboard-plus
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Create Task"
            subtitle: "Add a new task"

          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: markdown
            content: |
              To create a new task:

              1. Add an item to the tasks list below
              2. The task will be created with default settings
              3. Tap the item to edit details

              **Tip:** Set due dates and priorities via the todo-list interface!

          - type: todo-list
            entity: todo.yahatl_tasks
            title: Create Task

  # ======================
  # NEW CHORE VIEW
  # ======================
  - title: New Chore
    path: new-chore
    icon: mdi:broom
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Create Chore"
            subtitle: "Add a recurring chore"

          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: markdown
            content: |
              To create a new chore:

              1. Add an item to the chores list below
              2. Default interval is 7 days
              3. Edit interval via the API or mobile app

              **API Endpoint:** `PUT /api/yahatl/notes/{id}/behaviours/chore`

              ```json
              { "intervalDays": 14 }
              ```

          - type: todo-list
            entity: todo.yahatl_chores
            title: Create Chore
