title: YAHATL
views:
  - title: Dashboard
    path: dashboard
    icon: mdi:checkbox-marked-outline
    type: sections
    max_columns: 3
    sections:
      # ======================
      # HEADER SECTION
      # ======================
      - type: grid
        column_span: 3
        cards:
          - type: custom:mushroom-title-card
            title: "YAHATL"
            subtitle: "{{ now().strftime('%A, %B %d') }}"

          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:alert-circle
                icon_color: |-
                  {% if states('sensor.yahatl_overdue_count') | int > 0 %}
                    red
                  {% else %}
                    green
                  {% endif %}
                content: "{{ states('sensor.yahatl_overdue_count') }} overdue"
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/tasks

              - type: template
                icon: mdi:calendar-today
                icon_color: |-
                  {% if states('sensor.yahatl_due_today') | int > 0 %}
                    orange
                  {% else %}
                    grey
                  {% endif %}
                content: "{{ states('sensor.yahatl_due_today') }} due today"

              - type: template
                icon: mdi:inbox
                icon_color: |-
                  {% if states('sensor.yahatl_inbox_count') | int > 0 %}
                    blue
                  {% else %}
                    grey
                  {% endif %}
                content: "{{ states('sensor.yahatl_inbox_count') }} inbox"
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/inbox

              - type: template
                icon: mdi:fire
                icon_color: |-
                  {% if states('sensor.yahatl_streaks_at_risk') | int > 0 %}
                    deep-orange
                  {% else %}
                    green
                  {% endif %}
                content: "{{ states('sensor.yahatl_streaks_at_risk') }} at risk"
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/habits

              - type: template
                icon: mdi:timer
                icon_color: |-
                  {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                    red
                  {% else %}
                    grey
                  {% endif %}
                content: |-
                  {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                    Focus
                  {% else %}
                    Ready
                  {% endif %}
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/pomodoro

      # ======================
      # TASKS SECTION - Full Metadata
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Tasks"
            subtitle: "{{ states('sensor.yahatl_tasks_list') }} active tasks"

          # Dynamic task cards using auto-entities
          - type: custom:auto-entities
            card:
              type: custom:layout-card
              layout_type: grid
              layout:
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr))
                gap: 8px
            card_param: cards
            filter:
              template: |-
                {% set items = state_attr('sensor.yahatl_tasks_list', 'items') or [] %}
                {% for task in items if task.status != 'Complete' %}
                  {{
                    {
                      "type": "custom:mushroom-template-card",
                      "primary": task.title,
                      "secondary": (task.priority ~ " priority" ~ (" | Due: " ~ task.due_date[:10] if task.due_date else "")),
                      "icon": "mdi:clipboard-check-outline",
                      "icon_color": (
                        "red" if task.priority == "Urgent" else
                        "orange" if task.priority == "High" else
                        "blue" if task.priority == "Normal" else
                        "grey"
                      ),
                      "badge_icon": ("mdi:alert" if task.due_date and task.due_date < now().isoformat() else ""),
                      "badge_color": "red",
                      "fill_container": true,
                      "tap_action": {
                        "action": "call-service",
                        "service": "rest_command.yahatl_complete_task",
                        "data": {
                          "note_id": task.id
                        },
                        "confirmation": {
                          "text": "Complete '" ~ task.title ~ "'?"
                        }
                      },
                      "hold_action": {
                        "action": "navigate",
                        "navigation_path": "/yahatl/task/" ~ task.id
                      }
                    }
                  }},
                {% endfor %}

      # ======================
      # CHORES SECTION - Full Metadata
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Chores"
            subtitle: "{{ states('sensor.yahatl_chores_list') }} recurring chores"

          - type: custom:auto-entities
            card:
              type: custom:layout-card
              layout_type: grid
              layout:
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr))
                gap: 8px
            card_param: cards
            filter:
              template: |-
                {% set items = state_attr('sensor.yahatl_chores_list', 'items') or [] %}
                {% for chore in items %}
                  {{
                    {
                      "type": "custom:mushroom-template-card",
                      "primary": chore.title,
                      "secondary": "Every " ~ chore.interval_days ~ " days" ~ (
                        " | " ~ (
                          "Overdue!" if chore.is_overdue else
                          "Due today" if chore.days_until_due == 0 else
                          "Due in " ~ chore.days_until_due ~ " days" if chore.days_until_due else
                          "Not scheduled"
                        )
                      ),
                      "icon": "mdi:broom",
                      "icon_color": (
                        "red" if chore.is_overdue else
                        "orange" if chore.days_until_due == 0 else
                        "green" if (chore.days_until_due or 0) > 2 else
                        "amber"
                      ),
                      "badge_icon": ("mdi:clock-alert" if chore.is_overdue else ""),
                      "badge_color": "red",
                      "fill_container": true,
                      "tap_action": {
                        "action": "call-service",
                        "service": "rest_command.yahatl_complete_chore",
                        "data": {
                          "note_id": chore.id
                        },
                        "confirmation": {
                          "text": "Complete '" ~ chore.title ~ "'?"
                        }
                      },
                      "hold_action": {
                        "action": "navigate",
                        "navigation_path": "/yahatl/chore/" ~ chore.id
                      }
                    }
                  }},
                {% endfor %}

      # ======================
      # HABITS SECTION - Full Metadata
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Habits"
            subtitle: "{{ states('sensor.yahatl_habits_list') }} habits tracked"

          - type: custom:auto-entities
            card:
              type: custom:layout-card
              layout_type: grid
              layout:
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr))
                gap: 8px
            card_param: cards
            filter:
              template: |-
                {% set items = state_attr('sensor.yahatl_habits_list', 'items') or [] %}
                {% set today = now().strftime('%Y-%m-%d') %}
                {% for habit in items %}
                  {% set completed_today = habit.last_completed and habit.last_completed[:10] == today %}
                  {{
                    {
                      "type": "custom:mushroom-template-card",
                      "primary": habit.title ~ " 🔥" ~ habit.current_streak,
                      "secondary": habit.frequency_goal ~ " | Best: " ~ habit.longest_streak ~ (
                        " | ✓ Done today" if completed_today else ""
                      ),
                      "icon": ("mdi:fire" if habit.current_streak > 0 else "mdi:fire-off"),
                      "icon_color": (
                        "green" if completed_today else
                        "orange" if habit.current_streak > 0 else
                        "grey"
                      ),
                      "badge_icon": ("mdi:check" if completed_today else ""),
                      "badge_color": "green",
                      "fill_container": true,
                      "tap_action": {
                        "action": "call-service",
                        "service": "rest_command.yahatl_log_habit",
                        "data": {
                          "note_id": habit.id
                        },
                        "confirmation": {
                          "text": "Log '" ~ habit.title ~ "' for today?"
                        }
                      },
                      "hold_action": {
                        "action": "navigate",
                        "navigation_path": "/yahatl/habit/" ~ habit.id
                      }
                    }
                  }},
                {% endfor %}

      # ======================
      # INBOX SECTION - Full Metadata
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: "Inbox"
            subtitle: "{{ states('sensor.yahatl_inbox_list') }} items to process"

          - type: custom:auto-entities
            card:
              type: custom:layout-card
              layout_type: grid
              layout:
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr))
                gap: 8px
            card_param: cards
            filter:
              template: |-
                {% set items = state_attr('sensor.yahatl_inbox_list', 'items') or [] %}
                {% for item in items %}
                  {{
                    {
                      "type": "custom:mushroom-template-card",
                      "primary": item.title,
                      "secondary": "Captured " ~ (item.created_at[:10] if item.created_at else "unknown"),
                      "icon": "mdi:inbox-arrow-down",
                      "icon_color": "blue",
                      "fill_container": true,
                      "tap_action": {
                        "action": "navigate",
                        "navigation_path": "/yahatl/note/" ~ item.id
                      },
                      "hold_action": {
                        "action": "call-service",
                        "service": "rest_command.yahatl_archive_note",
                        "data": {
                          "note_id": item.id
                        },
                        "confirmation": {
                          "text": "Archive '" ~ item.title ~ "'?"
                        }
                      }
                    }
                  }},
                {% endfor %}

      # ======================
      # POMODORO SECTION
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Pomodoro Timer
            subtitle: Focus session control

          - type: custom:mushroom-template-card
            primary: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                🔴 Focus Session Active
              {% else %}
                Ready to Focus
              {% endif %}
            secondary: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                Tap to stop the timer
              {% else %}
                Choose a duration below
              {% endif %}
            icon: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                mdi:timer-sand
              {% else %}
                mdi:timer-outline
              {% endif %}
            icon_color: |-
              {% if is_state('binary_sensor.yahatl_pomodoro_active', 'on') %}
                red
              {% else %}
                teal
              {% endif %}
            tap_action:
              action: call-service
              service: yahatl.stop_pomodoro
            fill_container: true

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "15m"
                icon: mdi:clock-fast
                icon_color: teal
                layout: vertical
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 15

              - type: custom:mushroom-template-card
                primary: "25m"
                icon: mdi:clock-outline
                icon_color: teal
                layout: vertical
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 25

              - type: custom:mushroom-template-card
                primary: "45m"
                icon: mdi:clock
                icon_color: teal
                layout: vertical
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 45

              - type: custom:mushroom-template-card
                primary: "60m"
                icon: mdi:clock-plus
                icon_color: teal
                layout: vertical
                tap_action:
                  action: call-service
                  service: yahatl.start_pomodoro
                  data:
                    duration_minutes: 60

      # ======================
      # CALENDAR SECTION
      # ======================
      - type: grid
        column_span: 2
        cards:
          - type: custom:mushroom-title-card
            title: Upcoming
            subtitle: Tasks and chores scheduled ahead

          - type: calendar
            entities:
              - entity: calendar.yahatl
            initial_view: listWeek

      # ======================
      # QUICK ACTIONS
      # ======================
      - type: grid
        cards:
          - type: custom:mushroom-title-card
            title: Quick Actions

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "Capture"
                icon: mdi:plus-circle
                icon_color: blue
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/capture

              - type: custom:mushroom-template-card
                primary: "New Task"
                icon: mdi:clipboard-plus
                icon_color: green
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/new-task

              - type: custom:mushroom-template-card
                primary: "New Chore"
                icon: mdi:broom
                icon_color: amber
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/new-chore

              - type: custom:mushroom-template-card
                primary: "New Habit"
                icon: mdi:fire
                icon_color: deep-orange
                layout: vertical
                tap_action:
                  action: navigate
                  navigation_path: /yahatl/new-habit

  # ======================
  # TASK DETAIL VIEW
  # ======================
  - title: Task Detail
    path: task
    icon: mdi:clipboard-check
    type: sections
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: markdown
            content: |
              # Task Details

              This is a detail view. The task ID is passed via URL.

              To edit task properties, use the API:

              ```
              PUT /api/yahatl/notes/{id}/behaviours/task
              {
                "priority": "High",
                "dueDate": "2026-01-15",
                "status": "InProgress"
              }
              ```

          - type: custom:mushroom-title-card
            title: "Edit Priority"

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "Low"
                icon: mdi:flag-outline
                icon_color: grey
                layout: vertical
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_task_priority
                  data:
                    priority: Low

              - type: custom:mushroom-template-card
                primary: "Normal"
                icon: mdi:flag
                icon_color: blue
                layout: vertical
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_task_priority
                  data:
                    priority: Normal

              - type: custom:mushroom-template-card
                primary: "High"
                icon: mdi:flag
                icon_color: orange
                layout: vertical
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_task_priority
                  data:
                    priority: High

              - type: custom:mushroom-template-card
                primary: "Urgent"
                icon: mdi:flag-variant
                icon_color: red
                layout: vertical
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_task_priority
                  data:
                    priority: Urgent

  # ======================
  # CHORE DETAIL VIEW
  # ======================
  - title: Chore Detail
    path: chore
    icon: mdi:broom
    type: sections
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: markdown
            content: |
              # Chore Details

              **Edit Interval:** Choose a repeat frequency below or use the API.

          - type: custom:mushroom-title-card
            title: "Set Repeat Interval"

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "Daily"
                secondary: "1 day"
                icon: mdi:calendar-today
                icon_color: red
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_chore_interval
                  data:
                    interval_days: 1

              - type: custom:mushroom-template-card
                primary: "Weekly"
                secondary: "7 days"
                icon: mdi:calendar-week
                icon_color: orange
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_chore_interval
                  data:
                    interval_days: 7

              - type: custom:mushroom-template-card
                primary: "Biweekly"
                secondary: "14 days"
                icon: mdi:calendar-range
                icon_color: amber
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_chore_interval
                  data:
                    interval_days: 14

              - type: custom:mushroom-template-card
                primary: "Monthly"
                secondary: "30 days"
                icon: mdi:calendar-month
                icon_color: green
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_chore_interval
                  data:
                    interval_days: 30

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "Quarterly"
                secondary: "90 days"
                icon: mdi:calendar-blank-multiple
                icon_color: teal
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_chore_interval
                  data:
                    interval_days: 90

              - type: custom:mushroom-template-card
                primary: "Yearly"
                secondary: "365 days"
                icon: mdi:calendar-star
                icon_color: purple
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_chore_interval
                  data:
                    interval_days: 365

  # ======================
  # HABIT DETAIL VIEW
  # ======================
  - title: Habit Detail
    path: habit
    icon: mdi:fire
    type: sections
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: markdown
            content: |
              # Habit Details

              **Edit Frequency Goal:** Choose below or use the API.

          - type: custom:mushroom-title-card
            title: "Set Frequency Goal"

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "Daily"
                icon: mdi:calendar-today
                icon_color: green
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_habit_frequency
                  data:
                    frequency_goal: daily

              - type: custom:mushroom-template-card
                primary: "Every 2 days"
                icon: mdi:calendar-range
                icon_color: teal
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_habit_frequency
                  data:
                    frequency_goal: "every 2 days"

              - type: custom:mushroom-template-card
                primary: "3x/week"
                icon: mdi:calendar-week
                icon_color: blue
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_habit_frequency
                  data:
                    frequency_goal: "3x per week"

              - type: custom:mushroom-template-card
                primary: "Weekly"
                icon: mdi:calendar-week-begin
                icon_color: purple
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_update_habit_frequency
                  data:
                    frequency_goal: weekly

  # ======================
  # CAPTURE VIEW
  # ======================
  - title: Capture
    path: capture
    icon: mdi:plus-circle
    type: sections
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: custom:mushroom-title-card
            title: "Quick Capture"
            subtitle: "Add to inbox"

          - type: entities
            entities:
              - entity: input_text.yahatl_capture_text
                name: "What's on your mind?"

          - type: custom:mushroom-template-card
            primary: "Capture"
            icon: mdi:inbox-arrow-down
            icon_color: blue
            tap_action:
              action: call-service
              service: rest_command.yahatl_capture
              data:
                title: "{{ states('input_text.yahatl_capture_text') }}"
            fill_container: true

  # ======================
  # NEW TASK VIEW
  # ======================
  - title: New Task
    path: new-task
    icon: mdi:clipboard-plus
    type: sections
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: custom:mushroom-title-card
            title: "Create Task"
            subtitle: "Add a new task with metadata"

          - type: entities
            entities:
              - entity: input_text.yahatl_capture_text
                name: "Task title"
              - entity: input_select.yahatl_task_priority
                name: "Priority"
              - entity: input_datetime.yahatl_task_due_date
                name: "Due date"

          - type: custom:mushroom-template-card
            primary: "Create Task"
            icon: mdi:clipboard-plus
            icon_color: green
            tap_action:
              action: call-service
              service: rest_command.yahatl_create_task
              data:
                title: "{{ states('input_text.yahatl_capture_text') }}"
                priority: "{{ states('input_select.yahatl_task_priority') }}"
                due_date: "{{ states('input_datetime.yahatl_task_due_date') }}"
            fill_container: true

  # ======================
  # NEW CHORE VIEW
  # ======================
  - title: New Chore
    path: new-chore
    icon: mdi:broom
    type: sections
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: custom:mushroom-title-card
            title: "Create Chore"
            subtitle: "Add a recurring chore"

          - type: entities
            entities:
              - entity: input_text.yahatl_capture_text
                name: "Chore name"
              - entity: input_number.yahatl_chore_interval
                name: "Repeat every (days)"

          - type: custom:mushroom-template-card
            primary: "Create Chore"
            icon: mdi:broom
            icon_color: amber
            tap_action:
              action: call-service
              service: rest_command.yahatl_create_chore
              data:
                title: "{{ states('input_text.yahatl_capture_text') }}"
                interval_days: "{{ states('input_number.yahatl_chore_interval') | int }}"
            fill_container: true

  # ======================
  # NEW HABIT VIEW
  # ======================
  - title: New Habit
    path: new-habit
    icon: mdi:fire
    type: sections
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: custom:mushroom-title-card
            title: "Create Habit"
            subtitle: "Start tracking a new habit"

          - type: entities
            entities:
              - entity: input_text.yahatl_capture_text
                name: "Habit name"
              - entity: input_select.yahatl_habit_frequency
                name: "Frequency goal"

          - type: custom:mushroom-template-card
            primary: "Create Habit"
            icon: mdi:fire
            icon_color: deep-orange
            tap_action:
              action: call-service
              service: rest_command.yahatl_create_habit
              data:
                title: "{{ states('input_text.yahatl_capture_text') }}"
                frequency_goal: "{{ states('input_select.yahatl_habit_frequency') }}"
            fill_container: true

  # ======================
  # INBOX VIEW
  # ======================
  - title: Inbox
    path: inbox
    icon: mdi:inbox
    type: sections
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: back
              - type: template
                icon: mdi:inbox
                icon_color: blue
                content: "{{ states('sensor.yahatl_inbox_list') }} items"

          - type: custom:mushroom-title-card
            title: "Inbox"
            subtitle: "Process your captured items"

          - type: custom:auto-entities
            card:
              type: custom:layout-card
              layout_type: grid
              layout:
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr))
                gap: 8px
            card_param: cards
            filter:
              template: |-
                {% set items = state_attr('sensor.yahatl_inbox_list', 'items') or [] %}
                {% for item in items %}
                  {{
                    {
                      "type": "custom:mushroom-template-card",
                      "primary": item.title,
                      "secondary": "Captured " ~ (item.created_at[:10] if item.created_at else "unknown"),
                      "icon": "mdi:inbox-arrow-down",
                      "icon_color": "blue",
                      "fill_container": true,
                      "tap_action": {
                        "action": "navigate",
                        "navigation_path": "/yahatl/process/" ~ item.id
                      }
                    }
                  }},
                {% endfor %}

  # ======================
  # PROCESS INBOX ITEM VIEW
  # ======================
  - title: Process Item
    path: process
    icon: mdi:inbox-arrow-up
    type: sections
    subview: true
    sections:
      - type: grid
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: back

          - type: custom:mushroom-title-card
            title: "Process Inbox Item"
            subtitle: "Convert to task, chore, or habit"

          - type: markdown
            content: |
              Select what to do with this item:

          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "→ Task"
                icon: mdi:clipboard-arrow-right
                icon_color: green
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_convert_to_task

              - type: custom:mushroom-template-card
                primary: "→ Chore"
                icon: mdi:broom
                icon_color: amber
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_convert_to_chore

              - type: custom:mushroom-template-card
                primary: "→ Habit"
                icon: mdi:fire
                icon_color: deep-orange
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_convert_to_habit

              - type: custom:mushroom-template-card
                primary: "Archive"
                icon: mdi:archive
                icon_color: grey
                tap_action:
                  action: call-service
                  service: rest_command.yahatl_archive_note
