# YAHATL Example Dashboard
# Replace "my_list" with your actual list name.
# No extra dependencies required — just the yahatl integration.

title: YAHATL
views:
  - title: Tasks
    path: yahatl
    cards:
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.yahatl_my_list_overdue
            name: Overdue
          - type: entity
            entity: sensor.yahatl_my_list_due_today
            name: Due Today
          - type: entity
            entity: sensor.yahatl_my_list_inbox_count
            name: Inbox
          - type: entity
            entity: sensor.yahatl_my_list_streak_risk
            name: Streaks

      - type: custom:yahatl-queue-card
        entity: sensor.yahatl_my_list_queue
        todo_entity: todo.yahatl_my_list
        title: Up Next
        max_items: 8

      - type: todo-list
        entity: todo.yahatl_my_list
        title: All Items
